<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 | Page Not Found</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Poppins,sans-serif;
background:#0B0B0F;
color:#fff;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

text-align:center;

padding:30px;

}

.container{

max-width:650px;

}

h1{

font-size:140px;
color:#00E5A8;
line-height:1;

}

h2{

font-size:42px;
margin:20px 0;

}

p{

font-size:18px;
color:#A0A0A0;
margin-bottom:40px;
line-height:1.8;

}

a{

display:inline-block;

padding:16px 36px;

background:#00E5A8;

color:#000;

font-weight:700;

border-radius:50px;

text-decoration:none;

transition:.3s;

}

a:hover{

transform:translateY(-4px);

box-shadow:0 15px 40px rgba(0,229,168,.25);

}

</style>

</head>

<body>

<div class="container">

<h1>404</h1>

<h2>Page Not Found</h2>

<p>

Sorry, the page you're looking for doesn't exist or has been moved.

</p>

<a href="index.html">

Back to Homepage

</a>

</div>

</body>

</html>
